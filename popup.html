<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; width: 280px; padding: 10px; }
    input { width: 90%; margin-bottom: 10px; padding: 5px; }
    button { width: 100%; padding: 8px; cursor: pointer; background: #4CAF50; color: white; border: none; }
    #liste { margin-top: 15px; padding-left: 0; list-style-type: none; }
    
    /* Nouveau design pour la liste et le bouton supprimer */
    li { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: #f4f4f4; 
      margin-bottom: 5px; 
      padding: 5px 10px; 
      border-radius: 3px; 
      font-size: 14px;
    }
    .btn-supprimer { 
      background: #ff4c4c; 
      color: white; 
      border: none; 
      border-radius: 3px; 
      cursor: pointer; 
      padding: 3px 7px; 
      width: auto;
      font-size: 12px;
      font-weight: bold;
    }
    .btn-supprimer:hover { background: #d93838; }
  </style>
</head>
<body>
  <h3>Mes Webtoons</h3>
  <input type="text" id="titre" placeholder="Ajout manuel: Nom du webtoon">
  <input type="number" id="chapitre" placeholder="Chapitre lu">
  <button id="sauvegarder">Sauvegarder manuellement</button>

  <ul id="liste"></ul>

  <script src="popup.js"></script>
</body>
</html>
